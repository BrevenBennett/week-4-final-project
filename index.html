<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Platform</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/a78d91bcb9.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <section id="landing">
      <nav>
        <img src="" alt="shutter" class="logo" />
        <ul>
          <li><a class="nav__link" href="#">Home</a></li>
          <li><a class="nav__link" href="#">Find your movie</a></li>
          <li><a class="nav__link nav__link--primary" href="#">CONTACT</a></li>
        </ul>
      </nav>
      <header>
        <h1>Browse our movies</h1>
        <form action="">
          <input type="text" placeholder="Search by Genre, Title, or Keyword" />
          <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
      </header>
    </section>

    <main>
      <h3>Search results:</h3>
      <h4>Year Range:</h4>

      <div class="movies">
        <div class="movie">
          <img src="" alt="2 fast 2 furious" class="movie__img" />
          <h3 class="movie__title">2 Fast 2 Furious</h3>
          <div class="movie__description">
            <div class="movie__description--year">Year: 2003</div>
            <div class="movie__description--id">IMBD ID: tt0322259</div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
